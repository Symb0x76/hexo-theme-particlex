# ParticleX Configuration
# https://github.com/theme-particlex/hexo-theme-particlex

# Avatar image
avatar: /images/avatar.jpg

# Home page background image
# Supports theme-specific background images:
# background:
#     light: /images/background.png
#     dark: /images/background-dark.png
# Legacy array syntax is still supported as fallback random images.
background:
    light: /images/background.png
    dark: /images/background-dark.png

# Loading image
loading: /images/loading.gif

# Optional colors for category and tag
colors:
    light:
      - "#ffa2c4"
      - "#00bcd4"
      - "#03a9f4"
      - "#00a596"
      - "#ff7d73"
      - "#5aa9e6"
      - "#8fbc8f"
      - "#f2a65a"
      - "#c792ea"
      - "#6ec6ca"
      - "#9aa5b1"
    dark:
      - "#ffb3d1"
      - "#4dd8e8"
      - "#5cbfff"
      - "#3ac4b6"
      - "#ff9b94"
      - "#8cc6ff"
      - "#a8d8a8"
      - "#f8bf86"
      - "#dab0ff"
      - "#8edee0"
      - "#bec7d1"

# ParticleX theme icon is adopts the Font Awesome 6
# https://fontawesome.com

# Main menu navigation
menu:
    Home:
        name: house
        theme: solid
        link: /
    About:
        name: id-card
        theme: solid
        link: /about
    Archives:
        name: box-archive
        theme: solid
        link: /archives
    Categories:
        name: bookmark
        theme: solid
        link: /categories
    Tags:
        name: tags
        theme: solid
        link: /tags

# Side info card
card:
    enable: true
    description: |
        分享开发经验、踩坑经历和个人兴趣爱好
    iconLinks:
      # Icon links in card, supports Font Awesome 6 icons
      - name: github
        theme: brands
        link: https://github.com/Symb0x76
      - name: bilibili
        theme: brands
        link: https://space.bilibili.com/356147928
    friendLinks:
        futurefe414: https://futurefe414.github.io/
        ttdr: http://blog.ttdr.top/
        # Y11han: https://blog.y11han.icu/
        # s3loy: https://blog.s3loy.tech/
        SeanDictionary: https://seandictionary.top/
        # cEvolve05: https://cevolve05.github.io/
        io-wy: https://io-wy.github.io/
        # Blauter: https://blog.bluespace.ren/
        # FOTH: https://www.foth.top/
footer:
    since: 2025
    # Customize the server domain name ICP
    ICP:
        enable: true
        link: https://beian.miit.gov.cn/
        code: 苏ICP备2024151671号-2
            # Polyfill
            # https://polyfill.io
polyfill:
    enable: true
    features:
      - default

# Highlight.js
# https://highlightjs.org
highlight:
    enable: true
    style: github

# KaTeX math rendering
math:
    enable: true

# Table of Contents
toc:
    enable: true

# Image preview
preview:
    enable: true

# Article encryption
crypto:
    enable: false

# Search
search:
    enable: true

# giscus
# https://github.com/giscus/giscus
giscus:
    enable: false
    src: https://giscus.app/client.js
    repo:
    repoID:
    category:
    categoryID:
    mapping: pathname
    strict: 0
    reactionsEnabled: 1
    emitMetadata: 0
    inputPosition: bottom
    theme: preferred_color_scheme
    lang:

        # Gitalk
        # https://github.com/gitalk/gitalk
gitalk:
    enable: false
    clientID: # Default ClientID
    clientSecret: # Default ClientSecret
    repo: # The name of repository of store comments
    owner: # GitHub repo owner
    admin: # GitHub repo owner and collaborators, only these guys can initialize github issues
    language: # en, zh-CN, zh-TW, es-ES, fr, ru, de, pl and ko are currently available
    proxy:
        # CORS proxy

        # Waline
        # https://github.com/walinejs/waline
waline:
    enable: true
    serverURL: https://waline-blog0x76.vercel.app # Waline server address url, you should set this to your own link
    locale:
        # Locale: https://waline.js.org/guide/client/i18n.html#locale-option
        nick: 昵称
        nickError: 昵称不能为空
        mail: 邮箱
        mailError: 邮箱格式不正确
        link: 网址
        optional: 可选
        placeholder: 欢迎留言，支持 Markdown
        submit: 提交
        preview: 预览
        sofa: 来发第一条评论吧~
        comment: 评论
        home: 首页
        login: 登录
        logout: 退出登录
        admin: 管理员
        sticky: 置顶
        word: 字
        wordHint: 评论字数应在 $0 到 $1 之间！
        loading: 加载中…
        reactionTitle: 你认为这篇文章怎么样？
        reaction0: 一般
        reaction1: 不错
        reaction2: 很棒
        reaction3: 超赞
        reply: 回复
        replyTo: 回复 @ $0
        cancelReply: 取消回复
        cancel: 取消
        confirm: 确认
        continue: 继续
        more: 加载更多
        refresh: 刷新
        uploadImage: 上传图片
        seconds: 秒前
        minutes: 分钟前
        hours: 小时前
        days: 天前
        now: 刚刚
        uploading: 正在上传…
        uploadDone: 上传完成
        uploadFail: 上传失败
        code: 验证码
        codeError: 验证码错误
    commentCount: true # If false, comment count will only be displayed in post page, not in home page
    pageview: false # Pageviews count, Note: You should not enable both `waline.pageview` and `leancloud_visitors`
    emoji:
      # Custom emoji
      - https://unpkg.com/@waline/emojis@1.4.0/weibo
      - https://unpkg.com/@waline/emojis@1.4.0/alus
      - https://unpkg.com/@waline/emojis@1.4.0/bilibili
      - https://unpkg.com/@waline/emojis@1.4.0/bmoji
      - https://unpkg.com/@waline/emojis@1.4.0/qq
      - https://unpkg.com/@waline/emojis@1.4.0/tieba
      - https://unpkg.com/@waline/emojis@1.4.0/tw-emoji
    meta:
      # Comment information, valid meta are nick, mail and link
      - nick
      - mail
      - link
    requiredMeta:
      # Set required meta field, e.g.: [nick] | [nick, mail]
      - nick
    lang: zh-CN # Language, available values: en-US, zh-CN, zh-TW, pt-BR, ru-RU, jp-JP
    wordLimit: 0 # Word limit, no limit when setting to 0
    login: enable # Whether enable login, can choose from 'enable', 'disable' and 'force'
    pageSize: 10 # Comment per page

# Twikoo
# https://github.com/imaegoo/twikoo
twikoo:
    enable: false
    envID:
    region:
    path: location.pathname
    lang:
